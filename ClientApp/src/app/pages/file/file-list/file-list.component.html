<div class="layout">
   
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="title">DataShare</div>

        <nav class="menu">
            <div class="menu-item active">Mes fichiers</div>
        </nav>

        <div class="footer">Copyright DataShare® 2025</div>
    </aside>

    <div class="main">
    
        <header class="header">
            <button class="btnMenu" routerLink="/files/upload">Ajouter des fichiers</button>
            <a class="logout" (click)="logout()">Déconnexion</a>
        </header>

        <div class="content">

            @if (message) {
                <div class="alert" [ngClass]="{
                    'alert-danger': messageType === 'error',
                    'alert-success': messageType === 'success'
                }" data-cy="filelist-div-alert">
                    {{ message }}
                </div>
            }
            
            <h2>Mes fichiers</h2>

            <div class="tabs">
                <span class="tab active">Tous</span>
                <span class="tab">Actifs</span>
                <span class="tab">Expiré</span>

                <button (click)="filter = 'all'; filterFiles(); ">Tous</button>
                <button (click)="filter = 'valid'; filterFiles(); ">Actifs</button>
                <button (click)="filter = 'expired'; filterFiles(); ">Expirés</button>

                <input
                    type="text"
                    placeholder="Filtrer par tag..."
                    [(ngModel)]="tagFilter"
                    (ngModelChange)="filterFiles()"
                />

            </div>
        
            <div class="file-list" *ngFor="let fileMeta of filteredFiles">
                <div class="file-item">
                <div class="file-info">
                    <strong>{{ fileMeta.originalFileName }}</strong>
                    <span>Expire le : {{ fileMeta.expirationDate }}</span>
                </div>
                <div class="file-actions">
                    <a href="#" (click)="deleteFile(fileMeta.token, $event)">Delete</a>
                    <button [routerLink]="['/file', fileMeta.token]">Accéder</button>
                </div>
                </div>
            </div>
        </div>
  </div>
</div>
